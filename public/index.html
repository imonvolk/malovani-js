<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sdílené Malování</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    #canvas {
      display: block;
      margin: 0 auto;
      border: 2px solid #333;
      background-color: white;
      cursor: crosshair;
    }
    .controls {
      text-align: center;
      margin: 20px 0;
    }
    button {
      padding: 10px 20px;
      margin: 0 10px;
      font-size: 16px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background-color: #45a049;
    }
    #colorPicker {
      width: 50px;
      height: 40px;
      border: none;
      cursor: pointer;
    }
    #brushSize {
      width: 100px;
    }
  </style>
</head>
<body>
  <h1>Sdílené Malování v Reálném Čase</h1>
  <div class="controls">
    <label for="colorPicker">Barva:</label>
    <input type="color" id="colorPicker" value="#000000">
    <label for="brushSize">Velikost štětce:</label>
    <input type="range" id="brushSize" min="1" max="50" value="5">
    <span id="brushSizeValue">5</span>
    <button id="clearBtn">Vymazat plátno</button>
  </div>
  <canvas id="canvas" width="800" height="600"></canvas>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
