<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malování</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    h1 {
      display: none;
    }
    #canvas {
      flex: 1;
      display: block;
      background-color: white;
      cursor: crosshair;
      border: none;
    }
    .controls {
      background-color: #333;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
    }
    label {
      color: white;
      font-size: 14px;
      margin: 0;
    }
    button {
      padding: 8px 16px;
      margin: 0;
      font-size: 14px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #45a049;
    }
    #colorPicker {
      width: 45px;
      height: 35px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    #brushSize {
      width: 80px;
    }
    #brushSizeValue {
      color: white;
      font-size: 14px;
      min-width: 25px;
    }
    .zoom-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #zoomLevel {
      color: white;
      font-size: 14px;
      min-width: 50px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Sdílené Malování v Reálném Čase</h1>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <label for="colorPicker">Barva:</label>
    <input type="color" id="colorPicker" value="#000000">
    <label for="brushSize">Štětec:</label>
    <input type="range" id="brushSize" min="1" max="50" value="5">
    <span id="brushSizeValue">5</span>
    <div class="zoom-controls">
      <button id="zoomOut">−</button>
      <span id="zoomLevel">100%</span>
      <button id="zoomIn">+</button>
    </div>
    <button id="clearBtn">Vymazat</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
