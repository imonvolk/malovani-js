<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malovani</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;--text:#e0e0e0;--muted:#555;--accent:#3a8ef6}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;height:100vh;overflow:hidden}
    #join-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg)}
    #join-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:44px 52px;display:flex;flex-direction:column;gap:14px;min-width:300px;box-shadow:0 12px 48px rgba(0,0,0,.7)}
    #join-box h1{font-size:1.5rem;font-weight:700}
    #join-box p{font-size:.85rem;color:var(--muted)}
    #join-box input{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:1rem;outline:none}
    #join-box input:focus{border-color:var(--accent)}
    #join-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-size:1rem;font-weight:600;cursor:pointer}
    #join-btn:hover{filter:brightness(1.15)}
    #app{display:none;height:100vh;flex-direction:column}
    #app.visible{display:flex}
    #toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0;user-select:none}
    .t-sep{width:1px;height:26px;background:var(--border);margin:0 1px;flex-shrink:0}
    .t-label{font-size:.68rem;color:var(--muted)}
    #tools{display:flex;gap:2px;flex-wrap:wrap}
    .tool-btn{background:none;border:1px solid transparent;border-radius:6px;color:var(--text);width:30px;height:28px;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .tool-btn:hover{background:var(--surface2)}
    .tool-btn.active{background:var(--surface2);border-color:var(--accent)}
    #palette{display:flex;gap:4px;flex-wrap:wrap}
    .swatch{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s}
    .swatch:hover{transform:scale(1.2)}
    .swatch.active{border-color:#fff;transform:scale(1.2)}
    #custom-color{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);cursor:pointer;padding:0;background:none}
    #size-slider,#opacity-slider{accent-color:var(--accent);width:76px}
    #size-val,#opacity-val{font-size:.7rem;color:var(--muted);min-width:28px}
    #font-select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-size:.75rem;padding:2px 4px;display:none}
    #my-chip{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
    #my-dot{width:10px;height:10px;border-radius:50%}
    .action-btn{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:.75rem;cursor:pointer;white-space:nowrap}
    .action-btn:hover{background:#2e2e2e}
    #clear-btn{color:#e74c3c;border-color:#e74c3c55}
    .toggle-btn{background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:.73rem;cursor:pointer;white-space:nowrap}
    .toggle-btn.on{color:var(--accent);border-color:var(--accent)}
    #main-area{flex:1;display:flex;min-height:0}
    #canvas-area{flex:1;position:relative;overflow:hidden;background:#fff;cursor:crosshair;min-width:0}
    #main-canvas,#preview-canvas,#grid-canvas{position:absolute;top:0;left:0}
    #preview-canvas{pointer-events:none}
    #grid-canvas{pointer-events:none;opacity:.3;display:none}
    #text-input-overlay{position:absolute;display:none;background:transparent;border:1px dashed #3a8ef6;outline:none;color:#000;font-size:20px;min-width:60px;padding:2px 4px;z-index:50;resize:none;overflow:hidden;white-space:pre}
    .remote-cursor{position:absolute;pointer-events:none;transform:translate(-4px,-4px);display:flex;flex-direction:column;gap:3px}
    .cursor-dot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,.5)}
    .cursor-label{background:rgba(0,0,0,.7);color:#fff;font-size:.68rem;padding:2px 6px;border-radius:4px;white-space:nowrap}
    #users-panel{position:absolute;bottom:12px;right:242px;background:rgba(15,15,15,.82);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:.73rem;backdrop-filter:blur(8px);z-index:10}
    #users-panel h3{font-size:.65rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
    .user-row{display:flex;align-items:center;gap:5px;padding:1px 0}
    .user-row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    #chat-panel{width:220px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column}
    #chat-panel h3{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:8px 10px 6px;border-bottom:1px solid var(--border)}
    #chat-messages{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px}
    #chat-messages::-webkit-scrollbar{width:4px}
    #chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .chat-msg{font-size:.75rem;line-height:1.4;word-break:break-word}
    .chat-msg .chat-name{font-weight:600}
    .chat-system{font-size:.7rem;color:var(--muted);text-align:center;font-style:italic}
    #chat-form{display:flex;border-top:1px solid var(--border)}
    #chat-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:.8rem;padding:8px 10px}
    #chat-send{background:none;border:none;color:var(--accent);font-size:.9rem;padding:0 10px;cursor:pointer}
  </style>
</head>
<body>

<div id="join-screen">
  <div id="join-box">
    <h1>Malovani</h1>
    <p>Sdilena kreslici plocha v realnem case.</p>
    <input id="username-input" maxlength="24" placeholder="Tvoje jmeno..." autocomplete="off" />
    <button id="join-btn">Pripojit se</button>
  </div>
</div>

<div id="app">
  <div id="toolbar">
    <div id="tools">
      <button class="tool-btn active" data-tool="pen"          title="Pero (P)">Per</button>
      <button class="tool-btn"        data-tool="eraser"       title="Guma (E)">Gum</button>
      <button class="tool-btn"        data-tool="spray"        title="Sprej (A)">Spr</button>
      <button class="tool-btn"        data-tool="line"         title="Cara (L)">Car</button>
      <button class="tool-btn"        data-tool="rect"         title="Obdelnik (R)">Obd</button>
      <button class="tool-btn"        data-tool="rect-fill"    title="Vyplneny obdelnik">ObdF</button>
      <button class="tool-btn"        data-tool="ellipse"      title="Elipsa (O)">Eli</button>
      <button class="tool-btn"        data-tool="ellipse-fill" title="Vyplnena elipsa">EliF</button>
      <button class="tool-btn"        data-tool="fill"         title="Kbelik (B)">Kbl</button>
      <button class="tool-btn"        data-tool="text"         title="Text (T)">Txt</button>
      <button class="tool-btn"        data-tool="picker"       title="Kapatko (K)">Kap</button>
    </div>
    <div class="t-sep"></div>
    <div id="palette"></div>
    <input type="color" id="custom-color" />
    <div class="t-sep"></div>
    <span class="t-label">Vel.</span>
    <input type="range" id="size-slider" min="1" max="80" value="5" />
    <span id="size-val">5</span>
    <div class="t-sep"></div>
    <span class="t-label">Kryt.</span>
    <input type="range" id="opacity-slider" min="5" max="100" value="100" />
    <span id="opacity-val">100%</span>
    <select id="font-select">
      <option value="sans-serif">Sans</option>
      <option value="serif">Serif</option>
      <option value="monospace">Mono</option>
      <option value="cursive">Cursive</option>
    </select>
    <div class="t-sep"></div>
    <button class="toggle-btn" id="sym-btn">Sym</button>
    <button class="toggle-btn" id="grid-btn">Mrizka</button>
    <div class="t-sep"></div>
    <button class="action-btn" id="undo-btn">Zpet</button>
    <button class="action-btn" id="export-btn">PNG</button>
    <button class="action-btn" id="clear-btn">Smazat vse</button>
    <div id="my-chip"><div id="my-dot"></div><span id="my-name"></span></div>
  </div>

  <div id="main-area">
    <div id="canvas-area">
      <canvas id="main-canvas"></canvas>
      <canvas id="preview-canvas"></canvas>
      <canvas id="grid-canvas"></canvas>
      <textarea id="text-input-overlay" rows="1" spellcheck="false"></textarea>
    </div>
    <div id="chat-panel">
      <h3>Chat</h3>
      <div id="chat-messages"></div>
      <form id="chat-form">
        <input id="chat-input" placeholder="Zprava..." maxlength="300" autocomplete="off" />
        <button type="submit" id="chat-send">OK</button>
      </form>
    </div>
  </div>

  <div id="users-panel">
    <h3>Online</h3>
    <div id="users-list"></div>
  </div>
</div>

<script>
var myId,myColor,myUsername,ws;
var activeTool='pen',brushColor='#e74c3c',brushSize=5,opacity=1,activeFont='sans-serif';
var symmetry=false,showGrid=false,drawing=false,shapeStart=null,lastPt=null;
var currentPoints=[],sprayBuffer=[],sprayInterval=null;
var allOps=[],myOpIndices=[],remoteUsers=new Map();
var PALETTE=['#1a1a1a','#ffffff','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#00bcd4','#ff5722','#795548','#607d8b'];

var joinScreen=document.getElementById('join-screen');
var appEl=document.getElementById('app');
var canvasArea=document.getElementById('canvas-area');
var canvas=document.getElementById('main-canvas');
var preview=document.getElementById('preview-canvas');
var gridCanvas=document.getElementById('grid-canvas');
var textOverlay=document.getElementById('text-input-overlay');
var ctx=canvas.getContext('2d');
var pCtx=preview.getContext('2d');
var gCtx=gridCanvas.getContext('2d');
var paletteEl=document.getElementById('palette');
var sizeSlider=document.getElementById('size-slider');
var opacitySlider=document.getElementById('opacity-slider');
var sizeVal=document.getElementById('size-val');
var opacityVal=document.getElementById('opacity-val');
var customColor=document.getElementById('custom-color');
var fontSelect=document.getElementById('font-select');
var usersList=document.getElementById('users-list');
var chatMessages=document.getElementById('chat-messages');
var chatInput=document.getElementById('chat-input');

function resizeCanvas(){
  var w=canvasArea.offsetWidth,h=canvasArea.offsetHeight;
  if(!w||!h)return;
  var tmp=document.createElement('canvas');
  tmp.width=canvas.width||w;tmp.height=canvas.height||h;
  tmp.getContext('2d').drawImage(canvas,0,0);
  canvas.width=w;canvas.height=h;preview.width=w;preview.height=h;gridCanvas.width=w;gridCanvas.height=h;
  ctx.drawImage(tmp,0,0);
  if(showGrid)drawGrid();
}

function drawGrid(){
  var W=gridCanvas.width,H=gridCanvas.height,s=40;
  gCtx.clearRect(0,0,W,H);gCtx.strokeStyle='#666';gCtx.lineWidth=0.5;
  for(var x=0;x<=W;x+=s){gCtx.beginPath();gCtx.moveTo(x,0);gCtx.lineTo(x,H);gCtx.stroke();}
  for(var y=0;y<=H;y+=s){gCtx.beginPath();gCtx.moveTo(0,y);gCtx.lineTo(W,y);gCtx.stroke();}
}

document.getElementById('grid-btn').addEventListener('click',function(){
  showGrid=!showGrid;this.classList.toggle('on',showGrid);
  gridCanvas.style.display=showGrid?'block':'none';if(showGrid)drawGrid();
});
document.getElementById('sym-btn').addEventListener('click',function(){
  symmetry=!symmetry;this.classList.toggle('on',symmetry);
});

function mirrorPt(p){return{x:1-p.x,y:p.y};}

function applyOp(op,tc){
  var c=tc||ctx,W=canvas.width,H=canvas.height;
  c.save();c.globalAlpha=op.alpha!=null?op.alpha:1;
  if(op.type==='stroke'){
    var pts=op.points;if(pts.length<2){c.restore();return;}
    c.beginPath();c.strokeStyle=op.color;c.lineWidth=op.size;c.lineCap='round';c.lineJoin='round';
    c.moveTo(pts[0].x*W,pts[0].y*H);
    for(var i=1;i<pts.length;i++)c.lineTo(pts[i].x*W,pts[i].y*H);
    c.stroke();
  }
  if(op.type==='spray'){
    c.fillStyle=op.color;
    for(var j=0;j<op.points.length;j++)c.fillRect(op.points[j].x*W,op.points[j].y*H,1.5,1.5);
  }
  if(op.type==='shape'){
    var x1=op.x1*W,y1=op.y1*H,x2=op.x2*W,y2=op.y2*H;
    c.strokeStyle=op.color;c.fillStyle=op.color;c.lineWidth=op.size;c.lineCap='round';c.lineJoin='round';
    if(op.kind==='line'){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();}
    else if(op.kind==='rect'){c.strokeRect(x1,y1,x2-x1,y2-y1);}
    else if(op.kind==='rect-fill'){c.fillRect(x1,y1,x2-x1,y2-y1);}
    else if(op.kind==='ellipse'){c.beginPath();c.ellipse((x1+x2)/2,(y1+y2)/2,Math.abs(x2-x1)/2,Math.abs(y2-y1)/2,0,0,Math.PI*2);c.stroke();}
    else if(op.kind==='ellipse-fill'){c.beginPath();c.ellipse((x1+x2)/2,(y1+y2)/2,Math.abs(x2-x1)/2,Math.abs(y2-y1)/2,0,0,Math.PI*2);c.fill();}
  }
  if(op.type==='fill')floodFill(c===ctx?ctx:c,Math.round(op.x*W),Math.round(op.y*H),op.color);
  if(op.type==='text'){
    c.fillStyle=op.color;c.font=op.size+'px '+(op.font||'sans-serif');c.textBaseline='top';
    var lines=op.text.split('\n');
    for(var k=0;k<lines.length;k++)c.fillText(lines[k],op.x*W,op.y*H+k*op.size*1.2);
  }
  c.restore();
}

function floodFill(tc,sx,sy,fh){
  var W=canvas.width,H=canvas.height;
  if(sx<0||sy<0||sx>=W||sy>=H)return;
  var id=tc.getImageData(0,0,W,H),d=id.data;
  var fr=parseInt(fh.slice(1,3),16),fg=parseInt(fh.slice(3,5),16),fb=parseInt(fh.slice(5,7),16);
  var i0=(sy*W+sx)*4,sr=d[i0],sg=d[i0+1],sb=d[i0+2],sa=d[i0+3];
  if(sr===fr&&sg===fg&&sb===fb&&sa===255)return;
  var stack=[sy*W+sx],vis=new Uint8Array(W*H);
  while(stack.length){
    var pos=stack.pop();if(vis[pos])continue;
    var px=pos%W,py=(pos/W)|0,ii=pos*4;
    if(d[ii]!==sr||d[ii+1]!==sg||d[ii+2]!==sb||d[ii+3]!==sa)continue;
    vis[pos]=1;d[ii]=fr;d[ii+1]=fg;d[ii+2]=fb;d[ii+3]=255;
    if(px>0)stack.push(pos-1);if(px<W-1)stack.push(pos+1);
    if(py>0)stack.push(pos-W);if(py<H-1)stack.push(pos+W);
  }
  tc.putImageData(id,0,0);
}

function reRender(){ctx.clearRect(0,0,canvas.width,canvas.height);allOps.forEach(function(op){applyOp(op);});}

function localUndo(){
  if(!myOpIndices.length)return;
  var idx=myOpIndices.pop();allOps.splice(idx,1);
  for(var i=0;i<myOpIndices.length;i++)if(myOpIndices[i]>idx)myOpIndices[i]--;
  reRender();
}

function recordOp(op){allOps.push(op);myOpIndices.push(allOps.length-1);}

document.querySelectorAll('.tool-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    commitTextIfActive();activeTool=btn.dataset.tool;
    document.querySelectorAll('.tool-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    fontSelect.style.display=activeTool==='text'?'inline-block':'none';
  });
});

function setColor(hex){
  brushColor=hex;
  document.querySelectorAll('.swatch').forEach(function(s){s.classList.toggle('active',s.dataset.c===hex);});
  customColor.value=hex;
}

PALETTE.forEach(function(hex){
  var sw=document.createElement('div');
  sw.className='swatch'+(hex===brushColor?' active':'');sw.style.background=hex;sw.dataset.c=hex;
  sw.addEventListener('click',function(){setColor(hex);});paletteEl.appendChild(sw);
});

customColor.addEventListener('input',function(e){setColor(e.target.value);});
fontSelect.addEventListener('change',function(e){activeFont=e.target.value;});
sizeSlider.addEventListener('input',function(e){brushSize=+e.target.value;sizeVal.textContent=brushSize;});
opacitySlider.addEventListener('input',function(e){opacity=+e.target.value/100;opacityVal.textContent=e.target.value+'%';});
document.getElementById('undo-btn').addEventListener('click',localUndo);
document.getElementById('clear-btn').addEventListener('click',function(){if(confirm('Smazat vsem?'))ws.send(JSON.stringify({type:'clear_all'}));});
document.getElementById('export-btn').addEventListener('click',function(){
  var a=document.createElement('a');a.download='malovani.png';a.href=canvas.toDataURL('image/png');a.click();
});

document.addEventListener('keydown',function(e){
  if(e.target===chatInput||e.target===textOverlay)return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();localUndo();return;}
  var map={p:'pen',e:'eraser',l:'line',r:'rect',b:'fill',k:'picker',o:'ellipse',t:'text',a:'spray'};
  if(!e.ctrlKey&&!e.metaKey&&map[e.key])document.querySelector('.tool-btn[data-tool="'+map[e.key]+'"]').click();
});

var textPos=null;
function commitTextIfActive(){
  if(textOverlay.style.display==='none'||!textPos)return;
  var text=textOverlay.value;textOverlay.style.display='none';textOverlay.value='';
  if(!text.trim())return;
  var sz=brushSize<8?20:brushSize;
  var op={type:'text',color:brushColor,size:sz,font:activeFont,text:text,x:textPos.x,y:textPos.y};
  recordOp(op);applyOp(op);
  ws.send(JSON.stringify({type:'text',color:brushColor,size:sz,font:activeFont,text:text,x:textPos.x,y:textPos.y}));
  textPos=null;
}
textOverlay.addEventListener('keydown',function(e){
  if(e.key==='Escape'){textOverlay.style.display='none';textOverlay.value='';textPos=null;}
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commitTextIfActive();}
  setTimeout(function(){textOverlay.style.height='auto';textOverlay.style.height=textOverlay.scrollHeight+'px';},0);
});

function sprayAt(pt){
  var r=brushSize*1.5,count=Math.ceil(brushSize*0.8);
  ctx.save();ctx.globalAlpha=opacity;ctx.fillStyle=brushColor;
  for(var i=0;i<count;i++){
    var angle=Math.random()*Math.PI*2,dist=Math.random()*r/canvas.width;
    var px=pt.x+Math.cos(angle)*dist,py=pt.y+Math.sin(angle)*dist;
    ctx.fillRect(px*canvas.width,py*canvas.height,1.5,1.5);sprayBuffer.push({x:px,y:py});
    if(symmetry)ctx.fillRect((1-px)*canvas.width,py*canvas.height,1.5,1.5);
  }
  ctx.restore();
}

function getPos(e){
  var r=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)/canvas.width,y:(src.clientY-r.top)/canvas.height};
}

canvas.addEventListener('mousedown',function(e){
  if(e.button!==0)return;var pt=getPos(e);
  if(activeTool==='picker'){pickColor(pt);return;}
  if(activeTool==='text'){
    commitTextIfActive();textPos=pt;var sz=brushSize<8?20:brushSize;
    textOverlay.style.display='block';
    textOverlay.style.left=(pt.x*canvas.width)+'px';textOverlay.style.top=(pt.y*canvas.height)+'px';
    textOverlay.style.fontSize=sz+'px';textOverlay.style.color=brushColor;textOverlay.style.fontFamily=activeFont;
    textOverlay.style.height='auto';setTimeout(function(){textOverlay.focus();},0);return;
  }
  if(activeTool==='fill'){
    var op={type:'fill',color:brushColor,x:pt.x,y:pt.y};
    recordOp(op);floodFill(ctx,Math.round(pt.x*canvas.width),Math.round(pt.y*canvas.height),brushColor);
    ws.send(JSON.stringify({type:'fill',color:brushColor,x:pt.x,y:pt.y}));
    if(symmetry){
      var m=mirrorPt(pt);recordOp({type:'fill',color:brushColor,x:m.x,y:m.y});
      floodFill(ctx,Math.round(m.x*canvas.width),Math.round(m.y*canvas.height),brushColor);
      ws.send(JSON.stringify({type:'fill',color:brushColor,x:m.x,y:m.y}));
    }
    return;
  }
  drawing=true;shapeStart=pt;lastPt=pt;currentPoints=[pt];
  if(activeTool==='spray'){sprayBuffer=[];sprayAt(pt);sprayInterval=setInterval(function(){sprayAt(lastPt);},30);}
});

canvas.addEventListener('mousemove',function(e){
  var pt=getPos(e);throttledCursorSend(pt);if(!drawing)return;lastPt=pt;
  if(activeTool==='pen'||activeTool==='eraser'){
    var prev=currentPoints[currentPoints.length-1];currentPoints.push(pt);
    var col=activeTool==='eraser'?'#ffffff':brushColor;
    ctx.save();ctx.globalAlpha=opacity;ctx.strokeStyle=col;ctx.lineWidth=brushSize;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(prev.x*canvas.width,prev.y*canvas.height);ctx.lineTo(pt.x*canvas.width,pt.y*canvas.height);ctx.stroke();
    if(symmetry){
      var mp=mirrorPt(prev),mt=mirrorPt(pt);
      ctx.beginPath();ctx.moveTo(mp.x*canvas.width,mp.y*canvas.height);ctx.lineTo(mt.x*canvas.width,mt.y*canvas.height);ctx.stroke();
    }
    ctx.restore();
  }else if(activeTool==='spray'){
    sprayAt(pt);
  }else{
    pCtx.clearRect(0,0,preview.width,preview.height);
    var po={type:'shape',kind:activeTool,color:brushColor,size:brushSize,alpha:opacity,x1:shapeStart.x,y1:shapeStart.y,x2:pt.x,y2:pt.y};
    applyOp(po,pCtx);
    if(symmetry)applyOp(Object.assign({},po,{x1:1-shapeStart.x,x2:1-pt.x}),pCtx);
  }
});

canvas.addEventListener('mouseup',function(e){
  if(!drawing)return;drawing=false;pCtx.clearRect(0,0,preview.width,preview.height);
  clearInterval(sprayInterval);sprayInterval=null;var pt=getPos(e);
  if(activeTool==='pen'||activeTool==='eraser'){
    if(currentPoints.length>=2){
      var col=activeTool==='eraser'?'#ffffff':brushColor;
      var op={type:'stroke',color:col,size:brushSize,alpha:opacity,points:currentPoints};
      recordOp(op);ws.send(JSON.stringify({type:'stroke',color:col,size:brushSize,alpha:opacity,points:currentPoints}));
      if(symmetry){
        var mpts=currentPoints.map(mirrorPt);
        var mop={type:'stroke',color:col,size:brushSize,alpha:opacity,points:mpts};
        recordOp(mop);applyOp(mop);ws.send(JSON.stringify({type:'stroke',color:col,size:brushSize,alpha:opacity,points:mpts}));
      }
    }
  }else if(activeTool==='spray'){
    if(sprayBuffer.length){
      var op={type:'spray',color:brushColor,size:brushSize,alpha:opacity,points:sprayBuffer.slice()};
      recordOp(op);ws.send(JSON.stringify({type:'spray',color:brushColor,size:brushSize,alpha:opacity,points:sprayBuffer}));
      if(symmetry){
        var mb=sprayBuffer.map(mirrorPt);
        var mop={type:'spray',color:brushColor,size:brushSize,alpha:opacity,points:mb};
        recordOp(mop);applyOp(mop);ws.send(JSON.stringify({type:'spray',color:brushColor,size:brushSize,alpha:opacity,points:mb}));
      }
      sprayBuffer=[];
    }
  }else if(['line','rect','rect-fill','ellipse','ellipse-fill'].indexOf(activeTool)>=0){
    var op={type:'shape',kind:activeTool,color:brushColor,size:brushSize,alpha:opacity,x1:shapeStart.x,y1:shapeStart.y,x2:pt.x,y2:pt.y};
    recordOp(op);applyOp(op);ws.send(JSON.stringify({type:'shape',kind:activeTool,color:brushColor,size:brushSize,alpha:opacity,x1:shapeStart.x,y1:shapeStart.y,x2:pt.x,y2:pt.y}));
    if(symmetry){
      var mo=Object.assign({},op,{x1:1-shapeStart.x,x2:1-pt.x});
      recordOp(mo);applyOp(mo);ws.send(JSON.stringify(mo));
    }
  }
  currentPoints=[];shapeStart=null;
});

canvas.addEventListener('mouseleave',function(){
  if(drawing)canvas.dispatchEvent(new MouseEvent('mouseup',{button:0,clientX:0,clientY:0}));
});

function pickColor(pt){
  var px=Math.round(pt.x*canvas.width),py=Math.round(pt.y*canvas.height);
  var d=ctx.getImageData(px,py,1,1).data;
  setColor('#'+[d[0],d[1],d[2]].map(function(v){return v.toString(16).padStart(2,'0');}).join(''));
}

var lastCS=0;
function throttledCursorSend(pt){
  var n=Date.now();if(n-lastCS<40)return;lastCS=n;
  ws.send(JSON.stringify({type:'cursor',x:pt.x,y:pt.y}));
}

function getOrCreateCursor(id,color,username){
  if(remoteUsers.has(id))return remoteUsers.get(id);
  var el=document.createElement('div');el.className='remote-cursor';
  el.innerHTML='<div class="cursor-dot" style="background:'+color+'"></div>'
    +'<div class="cursor-label" style="border-left:3px solid '+color+';padding-left:5px">'+username+'</div>';
  canvasArea.appendChild(el);
  var u={username:username,color:color,el:el};remoteUsers.set(id,u);return u;
}
function moveCursor(id,x,y){
  var u=remoteUsers.get(id);if(!u)return;
  u.el.style.left=(x*canvasArea.offsetWidth)+'px';u.el.style.top=(y*canvasArea.offsetHeight)+'px';
}
function removeCursor(id){var u=remoteUsers.get(id);if(u){u.el.remove();remoteUsers.delete(id);}}
function rebuildUserList(){
  usersList.innerHTML='';
  var me=document.createElement('div');me.className='user-row';
  me.innerHTML='<div class="user-row-dot" style="background:'+(myColor||'#aaa')+'"></div><span>'+(myUsername||'...')+' (ja)</span>';
  usersList.appendChild(me);
  remoteUsers.forEach(function(u){
    var row=document.createElement('div');row.className='user-row';
    row.innerHTML='<div class="user-row-dot" style="background:'+u.color+'"></div><span>'+u.username+'</span>';
    usersList.appendChild(row);
  });
}

function addChatMsg(username,color,text,system){
  var div=document.createElement('div');
  if(system){div.className='chat-system';div.textContent=text;}
  else{
    div.className='chat-msg';
    div.innerHTML='<span class="chat-name" style="color:'+color+'">'+username+': </span>'
      +'<span class="chat-text">'+text.replace(/</g,'&lt;')+'</span>';
  }
  chatMessages.appendChild(div);chatMessages.scrollTop=chatMessages.scrollHeight;
}

document.getElementById('chat-form').addEventListener('submit',function(e){
  e.preventDefault();var text=chatInput.value.trim();if(!text)return;
  chatInput.value='';addChatMsg(myUsername,myColor,text);
  ws.send(JSON.stringify({type:'chat',text:text}));
});

function connect(){
  var proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(proto+'://'+location.host);
  ws.addEventListener('open',function(){ws.send(JSON.stringify({type:'join',username:myUsername}));});
  ws.addEventListener('message',function(e){
    var msg=JSON.parse(e.data);
    if(msg.type==='init'){
      myId=msg.id;myColor=msg.color;
      document.getElementById('my-dot').style.background=myColor;
      document.getElementById('my-name').textContent=myUsername;
      msg.users.forEach(function(u){if(u.id!==myId)getOrCreateCursor(u.id,u.color,u.username);});
      rebuildUserList();allOps.length=0;myOpIndices.length=0;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      msg.history.forEach(function(op){allOps.push(op);applyOp(op);});
    }
    if(msg.type==='user_join'&&msg.id!==myId){
      getOrCreateCursor(msg.id,msg.color,msg.username);rebuildUserList();
      addChatMsg(null,null,msg.username+' se pripojil/a',true);
    }
    if(msg.type==='user_leave'){
      var u=remoteUsers.get(msg.id);if(u)addChatMsg(null,null,u.username+' se odpojil/a',true);
      removeCursor(msg.id);rebuildUserList();
    }
    if(msg.type==='cursor')moveCursor(msg.id,msg.x,msg.y);
    if(msg.type==='op'){allOps.push(msg.op);applyOp(msg.op);}
    if(msg.type==='clear_all'){allOps.length=0;myOpIndices.length=0;ctx.clearRect(0,0,canvas.width,canvas.height);}
    if(msg.type==='chat')addChatMsg(msg.username,msg.color,msg.text);
  });
  ws.addEventListener('close',function(){setTimeout(connect,2000);});
}

function joinApp(){
  var name=document.getElementById('username-input').value.trim();if(!name)return;
  myUsername=name;joinScreen.style.display='none';appEl.classList.add('visible');
  resizeCanvas();connect();
}
document.getElementById('join-btn').addEventListener('click',joinApp);
document.getElementById('username-input').addEventListener('keydown',function(e){if(e.key==='Enter')joinApp();});
window.addEventListener('resize',resizeCanvas);
</script>
